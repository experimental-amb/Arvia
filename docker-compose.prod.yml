# ============================================================
# docker-compose.prod.yml — Arvia produccion
# Para VPS (DigitalOcean, Railway, Render, Hetzner, etc.)
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisitos:
#   - .env con todas las variables de .env.example
#   - Aplicar migraciones: ver migrations/README.md
#   - Puerto 5678 expuesto solo localmente (reverse proxy via nginx/caddy)
# ============================================================

volumes:
  postgres_data:
  n8n_data:

networks:
  arvia_internal:
    driver: bridge

services:

  postgres:
    image: postgres:15-alpine
    container_name: arvia_postgres
    restart: always
    networks:
      - arvia_internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Santiago
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro  # Aplica migrations al iniciar
    # NO exponer puerto en prod — solo acceso interno via red Docker
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.17.3
    container_name: arvia_n8n
    restart: always
    networks:
      - arvia_internal
    ports:
      # En prod: exponer solo a localhost y usar nginx/caddy como reverse proxy
      # Cambiar a "127.0.0.1:5678:5678" si hay reverse proxy en el host
      - "5678:5678"
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Core
      GENERIC_TIMEZONE: America/Santiago
      TZ: America/Santiago
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console

      # Webhook — URL publica del VPS (sin ngrok en produccion)
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: https

      # Security
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEB_API_KEY: ${WEB_API_KEY}

      # CORS
      N8N_CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
      N8N_CORS_ALLOWED_HEADERS: "Origin, Content-Type, Accept, Authorization, X-Api-Key, X-Request-ID"

      # Performance
      EXECUTIONS_PROCESS: main
      N8N_RUNNERS_ENABLED: "true"
      EXECUTIONS_DATA_MAX_AGE: 336   # 14 dias
      EXECUTIONS_DATA_PRUNE: "true"

    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
