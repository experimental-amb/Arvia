name: CI — Typecheck & Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint check
        run: npx next lint --max-warnings 0
        continue-on-error: true

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: frontend

    env:
      # Variables de entorno minimas para que next build no falle
      NEXT_PUBLIC_USE_MOCK: "true"
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-project"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000:web:000000"
      NEXT_PUBLIC_API_BASE_URL: "https://placeholder.ngrok-free.app/webhook/web-api"
      NEXT_PUBLIC_API_KEY: "ci-placeholder-key"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nextjs-build-${{ github.sha }}
          path: frontend/.next/
          retention-days: 3
